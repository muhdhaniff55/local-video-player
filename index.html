<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalStream Pro | 4K Media Player</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        :root {
            --primary: #6366f1; 
            --glass: rgba(15, 23, 42, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --plyr-color-main: #6366f1;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at top, #1e1b4b 0%, #020617 100%);
            color: #f8fafc;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Clean, Professional Title */
        h1 { 
            font-weight: 800;
            font-size: 2.2rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .upload-container {
            width: 100%;
            max-width: 800px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 60px 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-container:hover {
            border-color: var(--primary);
            background: rgba(30, 41, 59, 0.9);
        }

        .btn-upload {
            background: var(--primary);
            color: white;
            padding: 14px 35px;
            border-radius: 12px;
            font-weight: 600;
            display: inline-block;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .player-wrapper {
            width: 100%;
            max-width: 1100px;
            border-radius: 24px;
            overflow: hidden;
            background: #000;
            border: 1px solid var(--border);
            display: none; 
            margin-top: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        #file-info {
            margin-top: 20px;
            color: #94a3b8;
            font-size: 0.9rem;
            background: rgba(255,255,255,0.05);
            padding: 8px 15px;
            border-radius: 30px;
        }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <h1>LocalStream Pro</h1>
    <div class="subtitle">Secure Local Playback • No Upload Required</div>
    
    <div class="upload-container" id="dropZone">
        <p style="font-size: 1.2rem; margin: 0;">Drag and drop your movie file</p>
        <p style="color: #64748b; font-size: 0.9rem; margin-top: 5px;">Supports MP4, MKV, WebM (4K Ready)</p>
        <div class="btn-upload">Open File</div>
        <input type="file" id="fileInput" accept="video/*">
    </div>

    <div class="player-wrapper" id="playerWrapper">
        <video id="player" playsinline controls preload="metadata"></video>
    </div>

    <div id="file-info" style="display:none"></div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const playerWrapper = document.getElementById('playerWrapper');
        const fileInfo = document.getElementById('file-info');
        
        const player = new Plyr('#player', {
            controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'settings', 'pip', 'fullscreen'],
            settings: ['speed', 'quality'],
            tooltips: { controls: true, seek: true }
        });

        let currentUrl = null;

        function handleFile(file) {
            if (!file || !file.type.startsWith('video/')) return;

            // Memory cleanup for heavy files
            if (currentUrl) URL.revokeObjectURL(currentUrl);
            currentUrl = URL.createObjectURL(file);

            player.source = {
                type: 'video',
                title: file.name,
                sources: [{ src: currentUrl, type: file.type }]
            };

            playerWrapper.style.display = 'block';
            fileInfo.style.display = 'inline-block';
            
            // Format file size for clarity
            const size = file.size > 1073741824 
                ? (file.size / 1073741824).toFixed(2) + ' GB' 
                : (file.size / 1048576).toFixed(2) + ' MB';
            
            fileInfo.innerHTML = `📄 <strong>${file.name}</strong> • ${size}`;
            
            player.once('canplay', () => {
                player.play();
                playerWrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });
        }

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
        
        dropZone.addEventListener('dragover', (e) => { 
            e.preventDefault(); 
            dropZone.style.borderColor = "var(--primary)";
            dropZone.style.background = "rgba(99, 102, 241, 0.05)";
        });

        dropZone.addEventListener('dragleave', () => { 
            dropZone.style.borderColor = "var(--border)"; 
            dropZone.style.background = "var(--glass)";
        });

        dropZone.addEventListener('drop', (e) => { 
            e.preventDefault(); 
            handleFile(e.dataTransfer.files[0]); 
        });
    </script>
</body>
</html>
