<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Stream | iOS Optimized Player</title>
    
    <link href="https://vjs.zencdn.net/8.6.1/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/city/index.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #00d2ff;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: var(--bg-color);
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
        }

        h1 { font-size: 1.5rem; letter-spacing: 2px; margin-bottom: 20px; }

        .upload-container {
            width: 100%;
            max-width: 600px;
            border: 2px dashed #334155;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            background: var(--card-bg);
            transition: all 0.3s ease;
            margin-bottom: 20px;
            cursor: pointer;
        }

        #fileInput { display: none; }

        .btn-upload, .btn-resync {
            background: var(--primary-color);
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
            cursor: pointer;
            border: none;
        }

        .btn-resync {
            background: #f59e0b;
            display: none;
            width: 100%;
            max-width: 300px;
        }

        #video-info {
            font-size: 0.85em;
            color: #94a3b8;
            margin-bottom: 15px;
            text-align: center;
            padding: 0 10px;
        }

        #video-container {
            width: 100%;
            max-width: 900px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            /* iOS GPU Acceleration: Prevents crashes during UI rendering */
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
        }

        .video-wrapper {
            position: relative;
            padding-top: 56.25%;
        }

        .video-js {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
        }

        /* Better mobile touch targets */
        .vjs-big-play-button {
            width: 2em !important;
            height: 2em !important;
            line-height: 2em !important;
            border-radius: 50% !important;
        }
    </style>
</head>
<body>

    <h1>🎬 PRO<b>STREAM</b></h1>
    
    <div class="upload-container" id="dropZone">
        <p>Select or Drag Video</p>
        <label for="fileInput" class="btn-upload">Browse Files</label>
        <input type="file" id="fileInput" accept="video/*">
    </div>

    <div id="video-info">
        <span>Ready for playback</span><br>
        <button id="resyncBtn" class="btn-resync">🔊 Fix Audio / Resume</button>
    </div>

    <div id="video-container">
        <div class="video-wrapper">
            <video 
                id="videoPlayer" 
                class="video-js vjs-theme-city vjs-big-play-centered" 
                controls 
                preload="auto"
                playsinline
                webkit-playsinline
                muted
            >
            </video>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.6.1/video.min.js"></script>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const videoInfoSpan = document.querySelector('#video-info span');
        const resyncBtn = document.getElementById('resyncBtn');
        
        const player = videojs('videoPlayer', {
            playbackRates: [0.5, 1, 1.5, 2],
            fluid: false,
            responsive: true,
            userActions: { hotkeys: true }
        });

        let currentVideoURL = null;
        let lastTime = 0;
        let activeFileName = "";

        // 1. TRACK TIME (To resume after iOS reload)
        player.on('timeupdate', () => {
            if (player.currentTime() > 0) {
                lastTime = player.currentTime();
            }
        });

        // 2. AUTO-RECOVERY LOGIC
        // If iOS purges memory, the player emits 'error' or 'emptied'
        player.on(['error', 'emptied'], () => {
            if (currentVideoURL && player.currentTime() === 0 && lastTime > 0) {
                console.log("iOS Purge Detected. Attempting recovery...");
                recoverPlayback();
            }
        });

        function handleFile(file) {
            if (!file || !file.type.startsWith('video/')) return;

            activeFileName = file.name;
            if (currentVideoURL) URL.revokeObjectURL(currentVideoURL);
            currentVideoURL = URL.createObjectURL(file);
            
            player.src({ src: currentVideoURL, type: file.type });
            
            resyncBtn.style.display = 'inline-block';
            videoInfoSpan.innerHTML = `Loaded: <strong>${file.name}</strong>`;

            player.ready(() => {
                // On iOS, we start muted to ensure the reload doesn't block playback
                player.muted(true);
                player.play().catch(e => console.log("Manual play required"));
            });

            document.getElementById('video-container').scrollIntoView({ behavior: 'smooth' });
        }

        function recoverPlayback() {
            player.src({ src: currentVideoURL, type: 'video/mp4' }); // Re-assign src
            player.one('loadedmetadata', () => {
                player.currentTime(lastTime);
                player.play();
                videoInfoSpan.innerHTML = `❤️ Recovered: <strong>${activeFileName}</strong>`;
            });
        }

        // 3. MANUAL AUDIO RESTORE (iOS User Gesture)
        resyncBtn.addEventListener('click', () => {
            player.muted(false);
            player.volume(1.0);
            
            // Toggle play/pause to refresh the audio context
            if (player.paused()) {
                player.play();
            }

            resyncBtn.textContent = "🔊 Audio Active";
            resyncBtn.style.background = "#10b981";
            
            setTimeout(() => { 
                resyncBtn.textContent = "🔊 Fix Audio / Resume"; 
                resyncBtn.style.background = "#f59e0b"; 
            }, 2000);
        });

        // Event Listeners
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });
        dropZone.addEventListener('click', (e) => {
            if(e.target !== fileInput && e.target.tagName !== 'LABEL') fileInput.click();
        });
    </script>
</body>
</html>
