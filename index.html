<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaPlayer | Private Cinema</title>
    
    <link href="https://vjs.zencdn.net/8.6.1/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    
    <style>
        :root {
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --bg: #0b0e14;
            --surface: #161b22;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin: 40px 0;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: -1px;
            margin: 0;
            background: linear-gradient(to right, #fff, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-dim);
            margin-top: 8px;
        }

        .drop-card {
            width: 100%;
            max-width: 800px;
            background: var(--surface);
            border: 2px dashed #30363d;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            margin-bottom: 30px;
        }

        .drop-card:hover, .drop-card.dragover {
            border-color: var(--accent);
            background: #1c2128;
            transform: translateY(-2px);
        }

        #fileInput { display: none; }

        .btn-primary {
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover { background: var(--accent-hover); }

        #status-bar {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .file-name { color: var(--text-dim); font-style: italic; }

        .btn-resync {
            background: transparent;
            border: 1px solid #30363d;
            color: var(--text-dim);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            display: none;
        }

        .btn-resync:hover { color: white; border-color: var(--text-dim); }

        #player-shelf {
            width: 100%;
            max-width: 1000px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid #30363d;
            background: #000;
            display: none; 
        }

        .video-js {
            width: 100%;
            aspect-ratio: 16 / 9;
        }

        .vjs-theme-fantasy .vjs-play-progress { background-color: var(--accent); }
        .vjs-theme-fantasy .vjs-control-bar { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <header>
        <h1>NovaPlayer</h1>
        <p class="subtitle">Private, local playback without tracking.</p>
    </header>
    
    <div class="drop-card" id="dropZone">
        <div id="drop-text">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:15px; opacity:0.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p>Drop a movie file here to start streaming</p>
        </div>
        <button class="btn-primary" onclick="document.getElementById('fileInput').click()">Select File</button>
        <input type="file" id="fileInput" accept="video/*">
    </div>

    <div id="status-bar">
        <span class="file-name" id="fileNameDisplay">No file selected</span>
        <button id="resyncBtn" class="btn-resync">Fix Audio Lag</button>
    </div>

    <div id="player-shelf">
        <video 
            id="mainPlayer" 
            class="video-js vjs-theme-fantasy vjs-big-play-centered" 
            controls 
            preload="metadata"
            playsinline
            muted
        ></video>
    </div>

    <script src="https://vjs.zencdn.net/8.6.1/video.min.js"></script>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const resyncBtn = document.getElementById('resyncBtn');
        const playerShelf = document.getElementById('player-shelf');
        
        const player = videojs('mainPlayer', {
            playbackRates: [0.5, 1, 1.25, 1.5, 2],
            fluid: true,
            responsive: true
        });

        let currentFile = null;
        let objectURL = null;

        function loadVideo(file) {
            if (!file) return;
            
            currentFile = file;
            
            fileNameDisplay.textContent = `Streaming: ${file.name}`;
            playerShelf.style.display = 'block';
            resyncBtn.style.display = 'block';
            dropZone.style.padding = '20px'; 

            if (objectURL) URL.revokeObjectURL(objectURL);
            objectURL = URL.createObjectURL(file);

            player.src({ type: file.type, src: objectURL });
            
            player.ready(() => {
                player.play().catch(() => {
                    fileNameDisplay.textContent = "Click play to start (Autoplay blocked)";
                });
            });

            playerShelf.scrollIntoView({ behavior: 'smooth' });
        }

        resyncBtn.addEventListener('click', () => {
            const currentTime = player.currentTime();
            const isPaused = player.paused();

            player.pause();
            player.currentTime(currentTime - 0.1); 
            
            setTimeout(() => {
                if (!isPaused) player.play();
                resyncBtn.textContent = "Resynced!";
                setTimeout(() => resyncBtn.textContent = "Fix Audio Lag", 2000);
            }, 100);
        });

        fileInput.addEventListener('change', (e) => loadVideo(e.target.files[0]));

        dropZone.addEventListener('dragover', (e) => { 
            e.preventDefault(); 
            dropZone.classList.add('dragover'); 
        });

        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) loadVideo(e.dataTransfer.files[0]);
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                player.paused() ? player.play() : player.pause();
            }
        });
    </script>
</body>
</html>
